{% extends 'base.html' %}

{% block content %}

<div class="card main-card p-4 mx-auto" style="max-width: 500px;">

    <h2 class="text-center mb-4">🔐 Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'password_reset' %}">
            Forgot Password?
        </a>
    </div>

</div>

{% endblock %}
