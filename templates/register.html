{% extends 'base.html' %}

{% block content %}

<div class="card main-card p-4 mx-auto" style="max-width: 600px;">

    <h2 class="text-center mb-4">📝 Register</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary w-100">
            Create Account
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'login' %}">
            Already have an account? Login
        </a>
    </div>

</div>

{% endblock %}
